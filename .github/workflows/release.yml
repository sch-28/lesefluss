name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Parse version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. v1.2.3
          NAME="${TAG#v}"                   # 1.2.3
          MAJOR=$(echo "$NAME" | cut -d. -f1)
          MINOR=$(echo "$NAME" | cut -d. -f2)
          PATCH=$(echo "$NAME" | cut -d. -f3)
          CODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('apps/capacitor/android/**/*.gradle*') }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: apps/capacitor
        run: pnpm install --frozen-lockfile

      - name: Install rsvg-convert
        run: sudo apt-get install -y librsvg2-bin

      - name: Generate Android icons
        working-directory: apps/capacitor
        run: node scripts/gen-icons.mjs

      - name: Build web assets and sync to Android
        working-directory: apps/capacitor
        env:
          VITE_SYNC_URL: https://lesefluss.app
          VITE_CATALOG_URL: https://catalog.lesefluss.app
        run: |
          node scripts/deploy.mjs
          npx cap sync android

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode --ignore-garbage > apps/capacitor/android/app/release.keystore

      - name: Build APK + AAB
        working-directory: apps/capacitor/android
        env:
          VERSION_NAME: ${{ steps.version.outputs.name }}
          VERSION_CODE: ${{ steps.version.outputs.code }}
          KEYSTORE_PATH: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease bundleRelease

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Lesefluss ${{ steps.version.outputs.name }}" \
            --generate-notes \
            apps/capacitor/android/app/build/outputs/apk/release/app-release.apk
